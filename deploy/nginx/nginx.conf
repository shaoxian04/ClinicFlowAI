worker_processes auto;

events {
  worker_connections 1024;
}

http {
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_max_body_size 25m;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  'cid=$http_x_correlation_id ua="$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  upstream backend_upstream {
    server backend:8080;
  }

  upstream frontend_upstream {
    server frontend:3000;
  }

  server {
    listen 80;
    server_name _;

    # Correlation ID: generate if absent, propagate otherwise.
    set $cid $http_x_correlation_id;
    if ($cid = "") {
      set $cid $request_id;
    }

    # Spring Boot API only. Python agent is NEVER exposed here.
    location /api/ {
      proxy_set_header X-Correlation-ID $cid;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
      proxy_pass http://backend_upstream;
    }

    # Next.js app
    location / {
      proxy_set_header X-Correlation-ID $cid;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://frontend_upstream;
    }
  }
}
