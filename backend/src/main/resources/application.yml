spring:
  application:
    name: cliniflow-backend
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:neo4jpass}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/cliniflow}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        prepareThreshold: 0
        preparedStatementCacheQueries: 0
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

cliniflow:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-at-least-32-chars}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:60}
  agent:
    base-url: ${AGENT_SERVICE_URL:http://localhost:8000}
    service-token: ${AGENT_SERVICE_TOKEN:dev-token}
    connect-timeout-ms: 2000
    read-timeout-ms: 15000
  dev:
    seeded-doctor-id: 00000000-0000-0000-0000-000000000001
    seeded-patient-id: 00000000-0000-0000-0000-000000000010
  neo4j:
    outbox:
      poll-ms: 5000
      initial-delay-ms: 10000
  scheduling:
    timezone: Asia/Kuala_Lumpur
    horizon-extender-cron: "0 0 2 * * *"
  whatsapp:
    provider: ${WHATSAPP_PROVIDER:stub}    # stub | twilio
    drainer-fixed-delay-ms: 30000
    reaper-stuck-after-minutes: 2
    max-attempts: 5
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-whatsapp: ${TWILIO_FROM_WHATSAPP:whatsapp:+14155238886}

resilience4j:
  circuitbreaker:
    instances:
      llm:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 20
      stt:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 20
  timelimiter:
    instances:
      llm:
        timeoutDuration: 300s
      stt:
        timeoutDuration: 30s

logging:
  pattern:
    level: "%5p [cid=%X{correlationId:-}]"