spring:
  application:
    name: cliniflow-backend
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:neo4jpass}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/cliniflow}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        prepareThreshold: 0
        preparedStatementCacheQueries: 0
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

cliniflow:
  clinic:
    name: ${CLINIFLOW_CLINIC_NAME:CliniFlow Medical Clinic}
    address-line1: ${CLINIFLOW_CLINIC_ADDRESS_LINE1:No. 12, Jalan Bukit Bintang}
    address-line2: ${CLINIFLOW_CLINIC_ADDRESS_LINE2:55100 Kuala Lumpur, Malaysia}
    phone: ${CLINIFLOW_CLINIC_PHONE:+60 3-2145 8800}
    email: ${CLINIFLOW_CLINIC_EMAIL:reception@cliniflow.demo}
    registration-number: ${CLINIFLOW_CLINIC_REGISTRATION_NUMBER:KKM-KL-2024-0451}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-at-least-32-chars}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:60}
  agent:
    base-url: ${AGENT_SERVICE_URL:http://localhost:8000}
    service-token: ${AGENT_SERVICE_TOKEN:dev-token}
    connect-timeout-ms: 2000
    read-timeout-ms: 15000
  dev:
    # users(id) of the seeded DOCTOR user — used for visits.doctor_id (FK→users)
    seeded-doctor-id: 00000000-0000-0000-0000-000000000001
    # doctors(id) PK of the seeded doctor row — used for appointment_slots.doctor_id
    # and any join into the doctors table. DIFFERENT from seeded-doctor-id above.
    seeded-doctor-pk: 00000000-0000-0000-0000-000000000020
    seeded-patient-id: 00000000-0000-0000-0000-000000000010
  neo4j:
    outbox:
      poll-ms: 5000
      initial-delay-ms: 10000
  scheduling:
    timezone: Asia/Kuala_Lumpur
    horizon-extender-cron: "0 0 2 * * *"
  whatsapp:
    provider: ${WHATSAPP_PROVIDER:stub}    # stub | twilio | meta-cloud
    drainer-fixed-delay-ms: 30000
    reaper-stuck-after-minutes: 2
    max-attempts: 5
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-whatsapp: ${TWILIO_FROM_WHATSAPP:whatsapp:+14155238886}
    meta-cloud:
      phone-number-id: ${META_PHONE_NUMBER_ID:}
      access-token: ${META_ACCESS_TOKEN:}
      api-version: ${META_API_VERSION:v21.0}
      default-template-name: ${META_DEFAULT_TEMPLATE_NAME:hello_world}
      default-template-language: ${META_DEFAULT_TEMPLATE_LANGUAGE:en_US}
      # Internal templateId -> Meta-approved template name. Unmapped ids fall
      # back to default-template-name (hello_world is safe pre-approval).
      template-names: >
        {
          appointment_confirmation_v1: '${META_TEMPLATE_APPOINTMENT_CONFIRMATION:cliniflow_appointment_confirmation_v1}',
          appointment_cancelled_v1:    '${META_TEMPLATE_APPOINTMENT_CANCELLED:cliniflow_appointment_cancelled_v1}',
          soap_meds_summary_v1:        '${META_TEMPLATE_SOAP_MEDS_SUMMARY:cliniflow_soap_meds_summary_v1}',
          soap_followup_reminder_v1:   '${META_TEMPLATE_SOAP_FOLLOWUP_REMINDER:cliniflow_soap_followup_reminder_v1}'
        }
      # Internal locale -> Meta language code.
      language-codes: >
        {
          en: 'en_US',
          ms: 'ms',
          zh: 'zh_CN'
        }

resilience4j:
  circuitbreaker:
    instances:
      llm:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 20
      stt:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 20
  timelimiter:
    instances:
      llm:
        timeoutDuration: 300s
      stt:
        timeoutDuration: 30s

logging:
  pattern:
    level: "%5p [cid=%X{correlationId:-}]"

# Sentry — when SENTRY_DSN is unset, the SDK is a no-op (zero overhead, no errors).
# Free tier: 5k events/month. See SAD §4.2.1.
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:development}
  release: ${SENTRY_RELEASE:cliniflow-backend@0.0.1-SNAPSHOT}
  send-default-pii: false
  traces-sample-rate: 0.0
  exception-resolver-order: -2147483647
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info