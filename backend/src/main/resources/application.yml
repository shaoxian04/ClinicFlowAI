spring:
  application:
    name: cliniflow-backend
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/cliniflow}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

cliniflow:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-at-least-32-chars}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:60}
  agent:
    base-url: ${AGENT_SERVICE_URL:http://localhost:8000}
    service-token: ${AGENT_SERVICE_TOKEN:dev-token}
    connect-timeout-ms: 2000
    read-timeout-ms: 15000

resilience4j:
  circuitbreaker:
    instances:
      llm:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 20
      stt:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 20
  timelimiter:
    instances:
      llm:
        timeoutDuration: 8s
      stt:
        timeoutDuration: 15s

logging:
  pattern:
    level: "%5p [cid=%X{correlationId:-}]"
